<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e8eaf6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 450px;
      height: 650px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: #3f51b5;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .chat-header h2 { font-size: 18px; margin-bottom: 4px; }
    .chat-header p { font-size: 13px; opacity: 0.8; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .bot {
      align-self: flex-start;
      background: #f0f0f0;
      color: #333;
      border-bottom-left-radius: 4px;
    }
    .user {
      align-self: flex-end;
      background: #3f51b5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-input {
      display: flex;
      padding: 16px;
      border-top: 1px solid #eee;
      gap: 10px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
    }
    .chat-input input:focus { border-color: #3f51b5; }
    .chat-input button {
      padding: 12px 20px;
      background: #3f51b5;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
    }
    .chat-input button:hover { background: #303f9f; }
    .typing { opacity: 0.6; font-style: italic; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>Hotel Bot</h2>
      <p>Contact Management</p>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">Hello! I can help you manage contacts. Try: add, list, or remove a contact.</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type a message..." autofocus>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const RASA_URL = "http://localhost:5005/webhooks/rest/webhook";
    const messagesDiv = document.getElementById("messages");
    const userInput = document.getElementById("userInput");

    userInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, "user");
      userInput.value = "";

      const typing = appendMessage("...", "bot typing");

      try {
        const res = await fetch(RASA_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sender: "user", message: text }),
        });
        const data = await res.json();
        typing.remove();

        if (data.length === 0) {
          appendMessage("I didn't understand that. Could you rephrase?", "bot");
        } else {
          data.forEach(msg => {
            if (msg.text) appendMessage(msg.text, "bot");
          });
        }
      } catch (err) {
        typing.remove();
        appendMessage("Could not connect to server. Is Rasa running on port 5005?", "bot");
      }

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function appendMessage(text, cls) {
      const div = document.createElement("div");
      div.className = "message " + cls;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
