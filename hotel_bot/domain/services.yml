version: "3.1"

actions:
  - action_list_services
  - action_service_detail
  - action_create_order
  - action_modify_service
  - action_check_booking_exist

slots:
  service_type:
    type: text
    mappings:
      - type: from_llm
  
  service_type_order:
    type: text
    mappings:
      - type: from_llm

  confirm_order:
    type: bool
    mappings:
      - type: from_llm

  quantity:
    type: float
    mappings:
      - type: from_llm

  date:
    type: text
    mappings:
      - type: from_llm

  time:
    type: text
    mappings:
      - type: from_llm

  note:
    type: text
    mappings:
      - type: from_llm

  user_name:
    type: text
    mappings:
      - type: from_llm

  phone_number:
    type: text
    mappings:
      - type: from_llm

  user_name_modify:
    type: text
    mappings:
      - type: from_llm

  phone_number_modify:
    type: text
    mappings:
      - type: from_llm

  service_type_modify:
    type: text
    mappings:
      - type: from_llm

  booking_found:              
    type: bool
    mappings:
      - type: custom

  quantity_modify:
    type: float
    mappings:
      - type: from_llm

  confirm_modify:
    type: bool
    mappings:
      - type: from_llm

  date_modify:
    type: text
    mappings:
      - type: from_llm

  time_modify:
    type: text
    mappings:
      - type: from_llm

  note_modify:
    type: text
    mappings:
      - type: from_llm

responses:
  utter_ask_service_type:
    - text: "👉 Which service would you like to see details for? (e.g., Massage, Buffet...)"
  utter_ask_service_type_order:
    - text: "Which service would you like to book?"
  utter_ask_quantity:
    - text: "How many slots/services do you need?"
  utter_ask_date:
    - text: "Which date would you like to use it?"
  utter_ask_time:
    - text: "What time would you like to book?"
  utter_ask_note:
    - text: "Do you have any additional notes?"
  utter_ask_user_name:
    - text: "May I have your name, please?"
  utter_ask_phone_number:
    - text: "May I have your phone number to confirm the service booking?"
  utter_ask_confirm_order:
    - text: "Do you want to confirm the service booking?"

  utter_confirm_order:
    - text: |
        Please confirm your booking:
        - Service: {service_type_order}
        - Date: {date}
        - Time: {time}
        - Quantity: {quantity}
        - Note: {note}
        - Name: {user_name}
        - Phone number: {phone_number}
        -> Type "yes" to confirm or "no" to cancel.

  utter_order_success:
    - text: "🎉 Service booking successful! We have recorded your information."

  utter_cancel_order:
    - text: "❌ Service booking cancelled."

  utter_ask_user_name_modify:
    - text: "Please provide the customer's name to verify the booking for modification."
  utter_ask_phone_number_modify:
    - text: "Please provide the phone number to verify the booking for modification."
  utter_ask_confirm_modify:
    - text: "Do you want to confirm the service change?"

  utter_ask_service_type_modify:
    - text: "Which booked service would you like to modify?"
  utter_ask_quantity_modify:
    - text: "What would you like to change the quantity to?"
  utter_ask_date_modify:
    - text: "What date would you like to change it to?"
  utter_ask_time_modify:
    - text: "What time would you like to change it to?"
  utter_ask_note_modify:
    - text: "What would you like to change the note to?"
  utter_booking_not_found:
    - text: "❌ Booking not found. Please check your name, phone number, or service."

  utter_confirm_modify:
    - text: |
        Are you sure you want to update the service?
        - Service: {service_type_modify}
        - New quantity: {quantity_modify}
        - New date: {date_modify}
        - New time: {time_modify}
        - New note: {note_modify}
        -> Type "yes" to confirm or "no" to cancel.

  utter_modify_success:
    - text: "✅ Your service has been updated successfully!"

  utter_cancel_modify:
    - text: "❌ Service update cancelled."