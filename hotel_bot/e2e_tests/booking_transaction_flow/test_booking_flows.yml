test_cases:
  - test_case: "Test 1: The Happy Path (Seamless Extraction)"
    steps:
      - user: "Hi, I need to book 1 Deluxe room for 2 adults and 0 children from October 15, 2026 until October 20, 2026. My name is Nguyen Van A, phone 0901234567, email a.nguyen@test.com."
      - slot_was_set:
          - room_type: "Deluxe"
          - adults_count: 2
          - children_count: 0
          - check_in_date: "2026-10-15" 
          - check_out_date: "2026-10-20"
          - guest_name: "Nguyen Van A"
          - guest_phone: "0901234567"
          - guest_email: "a.nguyen@test.com"
      - bot: "Do you have any special preferences for your stay, such as a high floor, a quiet room, or early check-in?"
      - user: "No special requests, thank you."
      - slot_was_set:
          - special_requests: ~ # Using the explicit YAML null token
      - user: "Yes, book it."
      - slot_was_set:
          - confirm_booking: true

  - test_case: "Test 2: The Logic Trap (Past Date & 14-Day Limit Protection)"
    steps:
      - user: "I want to book a room starting April 1, 2026 for 20 days."
      - slot_was_set:
          - check_in_date: 2026-04-01 # Quotes removed so YAML parses it natively
      - slot_was_set:
          - check_in_date: ~ 
      - bot: "SYSTEM_INSTRUCTION: The check-in date is in the past. Politely inform the user that we can only book for today or future dates."
      - user: "Oops, I meant October 15, 2026 to October 18, 2026."
      - slot_was_set:
          - check_in_date: 2026-10-15
          - check_out_date: 2026-10-18

  - test_case: "Test 3: Mid-Flow Correction (Context Switching)"
    steps:
      - user: "I need 1 room for 2 adults."
      - slot_was_set:
          - room_count: 1
          - adults_count: 2
      - bot: "What date will you be checking in?"
      - user: "Wait, actually make that 3 adults and 2 rooms."
      - slot_was_set:
          - adults_count: 3
          - room_count: 2
      - bot: "What date will you be checking in?" 
      - user: "I'll check in on October 12, 2026."