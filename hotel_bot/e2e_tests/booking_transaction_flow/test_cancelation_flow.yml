test_cases:
  - test_case: "The Reversal Test: User backs out at double confirmation"
    steps:
      - user: "I need to cancel my reservation."
      - bot: "Could you please provide your alphanumeric booking reference ID?"
      - user: "It's HN5592."
      - slot_was_set:
          - booking_reference: "HN5592"
      - bot: "Are you absolutely sure you want to begin the cancellation process for this reservation?"
      - user: "Yes, start the process."
      - slot_was_set:
          - confirm_cancel_intent: true
      - bot: "Warning: Cancelling a reservation is irreversible. Do you want to permanently delete this booking?"
      - user: "Wait, no, actually keep it."
      - slot_was_set:
          - double_confirm_cancellation: false
      - bot: "Understood. I have safely aborted the cancellation process. Your reservation remains completely unchanged."