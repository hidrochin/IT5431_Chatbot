test_cases:
  - test_case: "The Unhappy Path: Routing a sold-out room request"
    # description: "Proves the Python backend intercepts a fully booked room and gracefully proposes an alternative."
    steps:
      - user: "I want to book the VIP Club Suite for tomorrow."
      - slot_was_set:
          - room_type: "Club Suite" # Mapped via the semantic dictionary
          - check_in_date: "tomorrow"
      - action: action_check_availability
      - slot_was_set:
          - room_type: null # Proves the Python script wiped the slot due to 0 inventory
      - bot: "SYSTEM_INSTRUCTION: Inform the user that the Club Suite is fully booked for those dates. However, we have the Deluxe available. Ask if they would like to book the Deluxe instead."
      - user: "Yeah, the Deluxe is fine."
      - slot_was_set:
          - room_type: "Deluxe" # Proves the alternative was successfully captured
      # - action: action_check_availability
      - bot: utter_ask_special_requests