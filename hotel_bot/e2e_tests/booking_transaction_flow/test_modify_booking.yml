test_cases:
  - test_case: "The Context-Switch Test: Modifying guest count"
    steps:
      - user: "I want to change the details of my booking."
      - bot: "Could you please provide your alphanumeric booking reference ID?"
      - user: "My ID is REF8832."
      - slot_was_set:
          - booking_reference: "REF8832"
      - bot: "What specific detail would you like to change? (For example: check-in date, room type, or number of adults)."
      - user: "I need to change the number of adults staying."
      - slot_was_set:
          - slot_to_modify: "adults_count"
      - slot_was_set:
          - adults_count: null
          - slot_to_modify: null
      - bot: "How many adults will be staying?"
      - user: "Make it 4 adults."
      - slot_was_set:
          - adults_count: 4.0