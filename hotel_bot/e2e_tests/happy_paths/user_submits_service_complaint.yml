test_cases:
  - test_case: user submits service complaint
    steps:
      - user: Tôi muốn phàn nàn về dọn phòng
      - slot_was_set:
          - request_type: complaint
      - utter: utter_complaint_apology
      - utter: utter_ask_service_code
      - user: housekeeping
      - slot_was_set:
          - service_code: housekeeping
      - utter: utter_ask_service_date
      - user: 4/1/2026
      - slot_was_set:
          - service_date: "4/1/2026"
      - utter: utter_ask_service_sub_context
      - user: bổ sung khăn
      - slot_was_set:
          - service_sub_context: bổ sung khăn
      - utter: utter_ask_service_time
      - user: 15:00
      - slot_was_set:
          - service_time: "15:00"
      - utter: utter_ask_room_number
      - user: 202
      - slot_was_set:
          - room_number: "202"
      - utter: utter_ask_complaint_detail
      - user: Dọn phòng ồn ào lúc tôi đang ngủ
      - slot_was_set:
          - complaint_detail: Dọn phòng ồn ào lúc tôi đang ngủ
      - utter: utter_ask_severity
      - user: high
      - slot_was_set:
          - severity: high
      - utter: Mình đã ghi nhận phản ánh về Dọn phòng vào ngày 01/04/2026. Hiện tại Trần Thị Lan đang phụ trách và sẽ xử lý ngay cho bạn.